<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Offline XYZ Map</title>
  <link rel="stylesheet" href="leaflet.css">
  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="leaflet.js"></script>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script>
    const defaultCenter = [41.8781, -87.6298];
    const defaultZoom = 11;
    let maxAvailableZoom = 13;
    let lastFix = L.latLng(defaultCenter[0], defaultCenter[1]);
    let followMode = true;
    let activeBridge = null;
    let gpsHandler = null;

    const map = L.map('map', { zoomControl: true, keepBuffer: 1 })
                 .setView(defaultCenter, defaultZoom);

    const tiles = L.tileLayer('chicago_xyz/{z}/{x}/{y}.png', {
      minZoom: 0,
      maxZoom: maxAvailableZoom,
      attribution: ''
    }).addTo(map);

    const gps = L.circleMarker(lastFix, { radius: 6 }).addTo(map);

    function applyMaxZoom(zoom) {
      if (!Number.isFinite(zoom)) {
        return;
      }
      maxAvailableZoom = Math.max(0, zoom);
      tiles.setMaxZoom(maxAvailableZoom);
      if (typeof map.setMaxZoom === 'function') {
        map.setMaxZoom(maxAvailableZoom);
      } else {
        map.options.maxZoom = maxAvailableZoom;
      }
      if (map.getZoom() > maxAvailableZoom) {
        map.setZoom(maxAvailableZoom);
      }
    }

    function applyInitialView(lat, lon, zoom) {
      if (!Number.isFinite(lat) || !Number.isFinite(lon)) {
        return;
      }
      lastFix = L.latLng(lat, lon);
      gps.setLatLng(lastFix);
      const targetZoom = Number.isFinite(zoom) ? Math.min(maxAvailableZoom, zoom) : map.getZoom();
      map.setView(lastFix, targetZoom, { animate: false });
    }

    function handleGpsUpdate(lat, lon, follow) {
      if (!Number.isFinite(lat) || !Number.isFinite(lon)) {
        return;
      }
      lastFix = L.latLng(lat, lon);
      gps.setLatLng(lastFix);
      followMode = follow !== false;
      if (followMode) {
        map.setView(lastFix, map.getZoom(), { animate: false });
      }
    }

    function detachBridge() {
      if (!activeBridge) {
        window.mapBridge = null;
        return;
      }
      try {
        if (gpsHandler && activeBridge.gpsUpdated && typeof activeBridge.gpsUpdated.disconnect === 'function') {
          activeBridge.gpsUpdated.disconnect(gpsHandler);
        }
      } catch (error) {
        console.warn('Failed to disconnect gpsUpdated handler', error);
      }
      try {
        if (gpsHandler && activeBridge.updateGPS && typeof activeBridge.updateGPS.disconnect === 'function') {
          activeBridge.updateGPS.disconnect(gpsHandler);
        }
      } catch (error) {
        console.warn('Failed to disconnect updateGPS handler', error);
      }
      try {
        if (activeBridge.initialViewSet && typeof activeBridge.initialViewSet.disconnect === 'function') {
          activeBridge.initialViewSet.disconnect(applyInitialView);
        }
      } catch (error) {
        console.warn('Failed to disconnect initialViewSet handler', error);
      }
      try {
        if (activeBridge.maxZoomChanged && typeof activeBridge.maxZoomChanged.disconnect === 'function') {
          activeBridge.maxZoomChanged.disconnect(applyMaxZoom);
        }
      } catch (error) {
        console.warn('Failed to disconnect maxZoomChanged handler', error);
      }
      gpsHandler = null;
      activeBridge = null;
      window.mapBridge = null;
    }

    function bindBridge(bridge) {
      detachBridge();
      if (!bridge) {
        return;
      }
      activeBridge = bridge;
      window.mapBridge = bridge;
      gpsHandler = (lat, lon, follow) => handleGpsUpdate(lat, lon, follow);
      if (bridge.gpsUpdated && typeof bridge.gpsUpdated.connect === 'function') {
        bridge.gpsUpdated.connect(gpsHandler);
      }
      if (bridge.updateGPS && typeof bridge.updateGPS.connect === 'function') {
        bridge.updateGPS.connect(gpsHandler);
      }
      if (bridge.initialViewSet && typeof bridge.initialViewSet.connect === 'function') {
        bridge.initialViewSet.connect(applyInitialView);
      }
      if (bridge.maxZoomChanged && typeof bridge.maxZoomChanged.connect === 'function') {
        bridge.maxZoomChanged.connect(applyMaxZoom);
      }
      if (typeof bridge.requestState === 'function') {
        bridge.requestState();
      }
    }

    if (typeof qt !== 'undefined' && qt.webChannelTransport) {
      new QWebChannel(qt.webChannelTransport, function(channel) {
        bindBridge(channel.objects.mapBridge);
      });
    }

    window.addEventListener('beforeunload', detachBridge);
  </script>
</body>
</html>
