<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Map</title>
  <link rel="stylesheet" href="leaflet.css" />
  <style>
    html, body, #map { height:100%; margin:0; }
  </style>
</head>
<body>
<div id="map"></div>
<script src="leaflet.js"></script>
<script src="sql-wasm.js"></script>
<script src="mbtiles.js"></script>
<script>
  var map = L.map('map').setView([0, 0], 13);

  if (typeof L.tileLayer.mbTiles === 'function') {
    var layer = L.tileLayer.mbTiles('map1.mbtiles', { maxZoom: 19 });
    layer.on('error', function (e) {
      console.error('Failed to load MBTiles:', e);
    });
    layer.addTo(map);
  } else {
    console.error('MBTiles plugin not available');
  }

  var marker = L.circleMarker([0, 0], {
    radius: 6,
    color: 'red',
    fillColor: 'red',
    fillOpacity: 1
  }).addTo(map);

  function updateMarker(lat, lon) {
    marker.setLatLng([lat, lon]);
    map.panTo([lat, lon]);
  }
</script>
</body>
</html>
